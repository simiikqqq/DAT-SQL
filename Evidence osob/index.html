<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidence osob</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <div class="container">
       
        <h1 class="main-title">Evidence osob</h1>
 
        <div class="card">
            <h2 class="card-title">Přidat / upravit osobu</h2>
           
            <form id="personForm">
                <input type="hidden" id="personId" value="">
 
                <fieldset>
                    <legend>Osobní údaje</legend>
                    <div class="grid-3">
                        <div class="form-group">
                            <label>Jméno <span>*</span></label>
                            <input type="text" id="jmeno" required class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Příjmení <span>*</span></label>
                            <input type="text" id="prijmeni" required class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Rodné číslo <span>*</span></label>
                            <input type="text" id="rodne_cislo" required class="form-control" placeholder="900101/1234">
                        </div>
                    </div>
                </fieldset>
 
                <fieldset>
                    <legend>Adresa</legend>
                    <div class="grid-4">
                        <div class="form-group">
                            <label>Ulice <span>*</span></label>
                            <input type="text" id="ulice" required class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Číslo popisné <span>*</span></label>
                            <input type="text" id="cislo_popisne" required class="form-control">
                        </div>
                        <div class="form-group">
                            <label>PSČ <span>*</span></label>
                            <input type="text" id="psc" required class="form-control" placeholder="110 00">
                        </div>
                        <div class="form-group">
                            <label>Město <span>*</span></label>
                            <input type="text" id="mesto" required class="form-control">
                        </div>
                    </div>
                </fieldset>
 
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Uložit</button>
                    <button type="button" id="btnCancel" class="btn btn-secondary">Zrušit</button>
                </div>
            </form>
        </div>
 
        <div class="card">
            <h2 class="card-title">Seznam osob</h2>
            <div class="table-sub">Evidované osoby</div>
           
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50px;">ID</th>
                            <th>Jméno</th>
                            <th>Příjmení</th>
                            <th>Rodné číslo</th>
                            <th>Ulice</th>
                            <th>Č.p.</th>
                            <th>PSČ</th>
                            <th>Město</th>
                            <th class="text-center" style="width: 160px;">Akce</th>
                        </tr>
                    </thead>
                    <tbody id="personTableBody">
                        </tbody>
                </table>
            </div>
        </div>
 
    </div>
 
    <script src="script.js"></script>
</body>
</html>
